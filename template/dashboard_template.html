<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ótica Alê Eyewear — Dashboard Semanal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #FAFAF7;
    --surface:    #FFFFFF;
    --border:     #E8E6DF;
    --border-2:   #D5D2CA;
    --text-1:     #1A1916;
    --text-2:     #5A5751;
    --text-3:     #9B9690;
    --teal:       #2B8C7E;
    --teal-light: #EBF5F3;
    --teal-mid:   #C2DED9;
    --red:        #C8503C;
    --red-light:  #FBF0EE;
    --gold:       #B8860B;
    --gold-light: #FDF6E3;
    --radius:     14px;
    --radius-sm:  8px;
    --shadow:     0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --shadow-md:  0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
  }

  body {
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text-1);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Typography ── */
  .font-display { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; }
  .font-mono    { font-family: 'JetBrains Mono', monospace; }

  /* ── Layout ── */
  .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-brand { display: flex; flex-direction: column; gap: 2px; }
  .brand-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.4px;
    color: var(--text-1);
  }
  .brand-sub {
    font-size: 12px;
    color: var(--text-3);
    font-weight: 400;
    letter-spacing: .3px;
  }
  .header-period {
    font-size: 13px;
    color: var(--text-2);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-weight: 500;
  }

  /* ── Period Selector ── */
  .period-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .period-bar label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .period-bar input[type="date"] {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-1);
    background: var(--bg);
    cursor: pointer;
  }
  .period-bar input[type="date"]:focus {
    outline: 2px solid var(--teal);
    outline-offset: 1px;
  }
  .period-sep { color: var(--text-3); font-size: 13px; }
  .period-btn {
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .period-btn:hover { background: #236f63; }
  .period-presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .preset-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
    white-space: nowrap;
  }
  .preset-btn:hover, .preset-btn.active {
    background: var(--teal-light);
    border-color: var(--teal);
    color: var(--teal);
  }
  .period-bar.hidden { display: none; }

  /* ── Main Content ── */
  .main { padding: 32px 0 64px; }

  /* ── Section Label ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 12px;
  }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 640px)  { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .kpi-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text-1);
    letter-spacing: -.5px;
    line-height: 1.2;
  }
  .kpi-value.accent { color: var(--teal); }
  .kpi-sub {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 4px;
  }

  /* ── City Selector ── */
  .city-selector {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .city-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    cursor: pointer;
    transition: all .15s ease;
    font-family: inherit;
    min-width: 160px;
    flex: 1;
  }
  .city-btn:hover {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .city-btn.active {
    border-color: var(--teal);
    background: var(--teal-light);
    box-shadow: 0 0 0 2px var(--teal-mid);
  }
  .city-btn-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: .2px;
  }
  .city-btn.active .city-btn-name { color: var(--teal); }
  .city-btn-stats {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--text-3);
  }
  .city-btn-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--text-2);
    font-size: 11px;
  }

  /* ── City Detail ── */
  .city-detail { display: none; }
  .city-detail.visible { display: block; }

  /* ── Metrics Grid ── */
  .metrics-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  .metrics-grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  @media (max-width: 768px) {
    .metrics-grid-3, .metrics-grid-4 { grid-template-columns: repeat(2, 1fr); }
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .metric-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 6px;
  }
  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-1);
  }
  .metric-value.green { color: var(--teal); }
  .metric-value.red   { color: var(--red); }
  .metric-value.gold  { color: var(--gold); }

  /* ── Chart & Table Layout ── */
  .chart-table-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 16px;
    margin-bottom: 28px;
    align-items: start;
  }
  @media (max-width: 900px) { .chart-table-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
  }
  .card-body { padding: 20px; }

  /* ── Offers Table ── */
  .offers-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .offers-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .offers-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .offers-table tr:last-child td { border-bottom: none; }
  .offers-table td.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .offers-table tr:hover td { background: var(--bg); }

  /* ── Offer Badge ── */
  .offer-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .3px;
  }

  /* ── Health Badge ── */
  .health-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .health-otimo  { background: var(--teal-light); color: var(--teal); }
  .health-ok     { background: var(--gold-light); color: var(--gold); }
  .health-caro   { background: var(--red-light); color: var(--red); }

  /* ── Top Creatives ── */
  .creatives-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 16px;
  }
  .creatives-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }
  @media (max-width: 1200px) { .creatives-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px)  { .creatives-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px)  { .creatives-grid { grid-template-columns: 1fr; } }

  .creative-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .15s, transform .15s;
  }
  .creative-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  /* Drop zone */
  .drop-zone {
    aspect-ratio: 9/16;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background .15s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    background: var(--teal-light);
    border-color: var(--teal);
  }
  .drop-zone.has-img { background: #000; }
  .drop-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }
  .drop-zone-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .drop-zone.has-img .drop-zone-hint { display: none; }
  .dz-manager-link {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 10;
    background: rgba(255,255,255,0.9);
    color: var(--teal);
    border: 1px solid var(--teal-mid);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 7px;
    text-decoration: none;
    line-height: 1.6;
  }
  .dz-manager-link:hover { background: var(--teal); color: #fff; }
  .drop-icon {
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    font-size: 16px;
  }
  .drop-text { font-size: 11px; color: var(--text-3); text-align: center; }
  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  /* Rank badge */
  .rank-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 26px;
    height: 26px;
    background: rgba(0,0,0,.65);
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    z-index: 2;
  }
  .rank-1 { background: rgba(184,134,11,.9); }
  .rank-2 { background: rgba(100,116,139,.9); }
  .rank-3 { background: rgba(146,64,14,.85); }

  /* Creative card body */
  .creative-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .creative-hook {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .creative-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .creative-metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .creative-metric-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .creative-metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
  }
  .creative-metric-value.green { color: var(--teal); }
  .creative-metric-value.red   { color: var(--red); }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-3);
    font-size: 14px;
  }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--border);
    padding: 20px 0;
    margin-top: 40px;
    font-size: 12px;
    color: var(--text-3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     Header
══════════════════════════════════════════════════ -->
<header class="header">
  <div class="container header-inner">
    <div class="header-brand">
      <span class="brand-name">Ótica Alê <span class="font-display">Eyewear</span></span>
      <span class="brand-sub">Dashboard Semanal · Meta Ads</span>
    </div>
    <span class="header-period" id="period-label">Carregando...</span>
  </div>
</header>

<!-- ══════════════════════════════════════════════════
     Main
══════════════════════════════════════════════════ -->
<main class="main">
  <div class="container">

    <!-- Seletor de período (só aparece se tiver histórico diário) -->
    <div class="period-bar hidden" id="period-bar">
      <label>Período</label>
      <input type="date" id="date-start"/>
      <span class="period-sep">→</span>
      <input type="date" id="date-end"/>
      <button class="period-btn" onclick="applyPeriod()">Aplicar</button>
      <div class="period-presets">
        <button class="preset-btn" onclick="setPreset(7)">7 dias</button>
        <button class="preset-btn" onclick="setPreset(14)">14 dias</button>
        <button class="preset-btn" onclick="setPreset(30)">30 dias</button>
        <button class="preset-btn" onclick="setPreset(90)">90 dias</button>
        <button class="preset-btn" onclick="setPreset(0)">Tudo</button>
      </div>
    </div>

    <!-- KPIs Gerais -->
    <div class="section-label">Visão geral da semana</div>
    <div class="kpi-grid" id="kpi-grid">
      <!-- Injetado pelo JS -->
    </div>

    <!-- Seletor de cidades -->
    <div class="section-label">Desempenho por cidade</div>
    <div class="city-selector" id="city-selector">
      <!-- Injetado pelo JS -->
    </div>

    <!-- Detalhes da cidade selecionada -->
    <div id="city-detail-container">
      <!-- Injetado pelo JS -->
    </div>

  </div><!-- /container -->
</main>

<!-- ══════════════════════════════════════════════════
     Footer
══════════════════════════════════════════════════ -->
<footer>
  <div class="container footer">
    <span>Ótica Alê Eyewear · Relatório gerado em <span id="generated-at">—</span></span>
    <span>Meta Marketing API · <span id="api-period">—</span></span>
  </div>
</footer>

<!-- ══════════════════════════════════════════════════
     Data injected by generate_dashboard.py
══════════════════════════════════════════════════ -->
<script>
const DASHBOARD_DATA = __DASHBOARD_DATA__;
const HISTORY_DATA   = __HISTORY_DATA__;
</script>

<!-- ══════════════════════════════════════════════════
     App JavaScript
══════════════════════════════════════════════════ -->
<script>
// ──────────────────────────────────────────────
// Utilities
// ──────────────────────────────────────────────

const fmt = {
  brl: v => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
  num: v => Number(v).toLocaleString('pt-BR'),
  pct: v => (Number(v) * 100).toFixed(1) + '%',
  dec: (v, d=2) => Number(v).toFixed(d),
};

function healthClass(cpa) {
  if (cpa === 0) return { cls: 'health-ok', label: '—' };
  if (cpa <= 5)  return { cls: 'health-otimo', label: 'Ótimo' };
  if (cpa <= 7)  return { cls: 'health-ok', label: 'OK' };
  return { cls: 'health-caro', label: 'Caro' };
}

function cpaColor(cpa) {
  if (cpa === 0) return '';
  if (cpa <= 5)  return 'green';
  if (cpa <= 7)  return 'gold';
  return 'red';
}

function offerBadgeStyle(offer) {
  const colors = DASHBOARD_DATA.offer_colors;
  const c = colors[offer] || colors['OUTRO'];
  return `background:${c.bg};color:${c.text}`;
}

// ──────────────────────────────────────────────
// Header & Footer
// ──────────────────────────────────────────────

function initHeaderFooter() {
  document.getElementById('period-label').textContent = DASHBOARD_DATA.period_label;

  const gen = DASHBOARD_DATA.generated_at;
  if (gen) {
    const d = new Date(gen);
    document.getElementById('generated-at').textContent =
      d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  const p = DASHBOARD_DATA.period;
  document.getElementById('api-period').textContent = `${p.start} → ${p.end}`;
}

// ──────────────────────────────────────────────
// KPI Cards
// ──────────────────────────────────────────────

function renderKPIsFromTotals(t) {
  const kpis = [
    { label: 'Investimento',    value: fmt.brl(t.spend),            sub: `${t.active_ads} anúncios ativos`, accent: false },
    { label: 'Conversas',       value: fmt.num(t.conversations),     sub: 'Mensagens iniciadas',             accent: true  },
    { label: 'CPA Médio',       value: fmt.brl(t.cpa),              sub: 'Custo por conversa',              accent: false },
    { label: 'Alcance',         value: fmt.num(t.reach),             sub: 'Pessoas únicas',                  accent: false },
    { label: 'Visitas ao Perfil', value: fmt.num(t.profile_visits),  sub: 'Via anúncios',                    accent: false },
    { label: 'Anúncios',        value: `${t.active_ads}/${t.ads_count}`, sub: 'Ativos / Total',             accent: false },
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value${k.accent ? ' accent' : ''} font-mono">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function renderKPIs() {
  renderKPIsFromTotals(DASHBOARD_DATA.totals);
}

// ──────────────────────────────────────────────
// City Selector
// ──────────────────────────────────────────────

let activeCity = null;
let offerChart = null;

function renderCitySelectorFromList(cities) {
  const container = document.getElementById('city-selector');
  container.innerHTML = cities.map((c, i) => `
    <button class="city-btn${i === 0 ? ' active' : ''}"
            onclick="selectCityFromList('${c.city}', currentCities)"
            id="citybtn-${c.city}">
      <span class="city-btn-name">${c.city}</span>
      <span class="city-btn-stats">
        <span>${c.conversations} conv.</span>
        <span>·</span>
        <span class="city-btn-stat-val">${fmt.brl(c.cpa)}</span>
      </span>
    </button>
  `).join('');
  currentCities = cities;
  if (cities.length > 0) selectCityFromList(cities[0].city, cities);
}

let currentCities = DASHBOARD_DATA.cities;

function renderCitySelector() {
  renderCitySelectorFromList(DASHBOARD_DATA.cities);
}

function selectCityFromList(cityName, cities) {
  document.querySelectorAll('.city-btn').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById('citybtn-' + cityName);
  if (activeBtn) activeBtn.classList.add('active');
  activeCity = cityName;
  const cityData = cities.find(c => c.city === cityName);
  if (cityData) renderCityDetail(cityData);
}

function selectCity(cityName) {
  selectCityFromList(cityName, currentCities);
}

// ──────────────────────────────────────────────
// City Detail
// ──────────────────────────────────────────────

    <!-- City Metrics -->
    <div class="metrics-grid-3">

        <div class="metric-label">Conversas</div>
        <div class="metric-value font-mono green">${fmt.num(city.conversations)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">CPA</div>
        <div class="metric-value font-mono ${cpaColorClass}">${fmt.brl(city.cpa)}</div>

    </div>
    <div class="metrics-grid-4">
      <div class="metric-card">
        <div class="metric-label">Alcance</div>

      </div>
      <div class="metric-card">
        <div class="metric-label">Impressões</div>
        <div class="metric-value font-mono">${fmt.num(city.impressions)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Cliques</div>
        <div class="metric-value font-mono">${fmt.num(city.clicks)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Anúncios ativos</div>
        <div class="metric-value font-mono">${city.active_ads}</div>
      </div>
    </div>

    <!-- Chart + Table -->
    <div class="chart-table-grid">
      <div class="card">
        <div class="card-header">Investimento e CPA por oferta</div>
        <div class="card-body">
          <canvas id="offers-chart" height="260"></canvas>

      </div>
      <div class="card">

    <!-- Top Creatives -->
    <div class="creatives-title">Top ${city.top_ads.length} criativos · ${city.city}</div>

// ──────────────────────────────────────────────
// Offers Table
// ──────────────────────────────────────────────

function renderOffersTable(offers) {
  if (!offers || offers.length === 0) {
    return '<div class="empty-state">Sem dados de oferta</div>';
  }

  const rows = offers.map(o => {
    const health = healthClass(o.cpa);
    return `
      <tr>
        <td>
          <span class="offer-badge" style="${offerBadgeStyle(o.offer)}">${o.offer}</span>
        </td>
        <td class="mono">${fmt.brl(o.spend)}</td>
        <td class="mono">${fmt.num(o.conversations)}</td>
        <td class="mono ${cpaColor(o.cpa)}">${o.cpa > 0 ? fmt.brl(o.cpa) : '—'}</td>
        <td class="mono">${fmt.num(o.clicks)}</td>
        <td><span class="health-badge ${health.cls}">${health.label}</span></td>
      </tr>
    `;
  }).join('');

  return `
    <table class="offers-table">
      <thead>
        <tr>
          <th>Oferta</th>
          <th>Gasto</th>
          <th>Conv.</th>
          <th>CPA</th>
          <th>Cliques</th>
          <th>Saúde</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ──────────────────────────────────────────────
// Offers Chart
// ──────────────────────────────────────────────

function renderOffersChart(city) {
  if (offerChart) {
    offerChart.destroy();
    offerChart = null;
  }

  const offers = city.offers_list || [];
  if (offers.length === 0) return;

  const labels = offers.map(o => o.offer);
  const spends = offers.map(o => o.spend);
  const cpas   = offers.map(o => o.cpa);

  const ctx = document.getElementById('offers-chart');
  if (!ctx) return;

  offerChart = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Investimento (R$)',
          data: spends,
          backgroundColor: labels.map(l => {
            const c = (DASHBOARD_DATA.offer_colors[l] || DASHBOARD_DATA.offer_colors['OUTRO']);
            return c.bg;
          }),
          borderColor: labels.map(l => {
            const c = (DASHBOARD_DATA.offer_colors[l] || DASHBOARD_DATA.offer_colors['OUTRO']);
            return c.text;
          }),
          borderWidth: 1.5,
          borderRadius: 6,
          yAxisID: 'y',
        },
        {
          type: 'line',
          label: 'CPA (R$)',
          data: cpas,
          borderColor: '#C8503C',
          backgroundColor: 'rgba(200,80,60,.1)',
          borderWidth: 2,
          pointBackgroundColor: '#C8503C',
          pointRadius: 4,
          tension: 0.3,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: {
            font: { family: 'Outfit', size: 11 },
            color: '#5A5751',
            boxWidth: 12,
            padding: 16,
          }
        },
        tooltip: {
          backgroundColor: '#1A1916',
          titleFont: { family: 'Outfit', size: 12 },
          bodyFont: { family: 'JetBrains Mono', size: 11 },
          padding: 12,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return ctx.dataset.label + ': R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: 'Outfit', size: 10 }, color: '#9B9690', maxRotation: 30 }
        },
        y: {
          position: 'left',
          grid: { color: '#E8E6DF' },
          ticks: {
            font: { family: 'JetBrains Mono', size: 10 },
            color: '#9B9690',
            callback: v => 'R$ ' + Number(v).toLocaleString('pt-BR', { maximumFractionDigits: 0 })
          }
        },
        y2: {
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: {
            font: { family: 'JetBrains Mono', size: 10 },
            color: '#C8503C',
            callback: v => 'R$ ' + Number(v).toFixed(2)
          }
        }
      }
    }
  });
}

// ──────────────────────────────────────────────
// Creative Cards
// ──────────────────────────────────────────────

const OFFER_THUMBS = {
  'R$ 1,00':        'thumbnails/r1',
  'MULTIFOCAL':     'thumbnails/multifocal',
  'EM DOBRO':       'thumbnails/em_dobro',
  'EXAME DE VISTA': 'thumbnails/exame_de_vista',
  'LIGAÇÃO':        'thumbnails/ligacao',
  'DIA DA MULHER':  'thumbnails/dia_da_mulher',
  'AQUECIMENTO':    'thumbnails/aquecimento',
};

function offerThumbTag(offer) {
  const base = OFFER_THUMBS[offer];
  if (!base) return '';
  return `<img src="${base}.jpg" alt="Thumbnail" class="dz-auto-thumb"
               onerror="this.src='${base}.png'; this.onerror=function(){this.remove();}"
               onload="this.closest('.drop-zone').classList.add('has-img');"/>`;
}

function renderCreativeCard(ad, rank, city) {
  const id = `${city}_${rank}`.replace(/[^a-zA-Z0-9_]/g, '_');
  const rankClass = rank <= 3 ? ` rank-${rank}` : '';
  const cpaCol = cpaColor(ad.cpa);

  return `
    <div class="creative-card">
      <div class="drop-zone"
           id="dz-${id}"
           ondragover="dzDragOver(event)"
           ondragleave="dzDragLeave(event, '${id}')"
           ondrop="dzDrop(event, '${id}')">
        <div class="rank-badge${rankClass}">${rank}</div>
        ${offerThumbTag(ad.offer)}
        <div class="drop-zone-hint">
          <div class="drop-icon">+</div>
          <span class="drop-text">Arraste o<br/>thumbnail aqui</span>
        </div>
        <input type="file" accept="image/*" onchange="dzFileInput(event, '${id}')" title="Selecionar imagem"/>
        ${(DASHBOARD_DATA.preview_urls && (DASHBOARD_DATA.preview_urls[ad.ad_id] || ad.preview_url)) ? `<a class="dz-manager-link" href="${DASHBOARD_DATA.preview_urls[ad.ad_id] || ad.preview_url}" target="_blank" title="Ver prévia do criativo">↗</a>` : ''}
      </div>
      <div class="creative-body">
        <span class="offer-badge" style="${offerBadgeStyle(ad.offer)}">${ad.offer}</span>
        <div class="creative-hook" title="${escHtml(ad.hook)}">${escHtml(ad.hook)}</div>
        <div class="creative-metrics">
          <div class="creative-metric">
            <span class="creative-metric-label">Conversas</span>
            <span class="creative-metric-value green font-mono">${fmt.num(ad.conversations)}</span>
          </div>
          <div class="creative-metric">
            <span class="creative-metric-label">CPA</span>
            <span class="creative-metric-value ${cpaCol} font-mono">${ad.cpa > 0 ? fmt.brl(ad.cpa) : '—'}</span>
          </div>
          <div class="creative-metric">
            <span class="creative-metric-label">Gasto</span>
            <span class="creative-metric-value font-mono">${fmt.brl(ad.spend)}</span>
          </div>
          <div class="creative-metric">
            <span class="creative-metric-label">CTR</span>
            <span class="creative-metric-value font-mono">${fmt.pct(ad.ctr)}</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ──────────────────────────────────────────────
// Drag & Drop for thumbnails
// ──────────────────────────────────────────────

function attachDropHandlers() {
  // handlers are inline via ondragover/ondrop attributes
}

function dzDragOver(e) {
  e.preventDefault();
  const dz = e.currentTarget;
  dz.classList.add('drag-over');
}

function dzDragLeave(e, id) {
  const dz = document.getElementById('dz-' + id);
  if (dz) dz.classList.remove('drag-over');
}

function dzDrop(e, id) {
  e.preventDefault();
  const dz = document.getElementById('dz-' + id);
  if (dz) dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    loadImageIntoDZ(file, id);
  }
}

function dzFileInput(e, id) {
  const file = e.target.files[0];
  if (file && file.type.startsWith('image/')) {
    loadImageIntoDZ(file, id);
  }
}

function loadImageIntoDZ(file, id) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const dz = document.getElementById('dz-' + id);
    if (!dz) return;
    let img = dz.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      img.alt = 'Thumbnail do criativo';
      dz.appendChild(img);
    }
    img.src = e.target.result;
    dz.classList.add('has-img');
  };
  reader.readAsDataURL(file);
}

// ──────────────────────────────────────────────
// Period selector (history mode)
// ──────────────────────────────────────────────

let currentAds = DASHBOARD_DATA.cities.flatMap(c => c.ads || []);

function initPeriodBar() {
  if (!DASHBOARD_DATA.has_history || !HISTORY_DATA || !HISTORY_DATA.records) return;

  const bar = document.getElementById('period-bar');
  bar.classList.remove('hidden');

  const records = HISTORY_DATA.records;
  const dates = records.map(r => r.date).filter(Boolean).sort();
  const minDate = dates[0] || '';
  const maxDate = dates[dates.length - 1] || '';

  const startEl = document.getElementById('date-start');
  const endEl   = document.getElementById('date-end');
  startEl.min = minDate; startEl.max = maxDate;
  endEl.min   = minDate; endEl.max   = maxDate;

  const maxDateObj = new Date(maxDate + 'T12:00:00');
  const defaultStart = new Date(maxDateObj);
  defaultStart.setDate(defaultStart.getDate() - 6);
  const defaultStartStr = defaultStart.toISOString().slice(0, 10);
  startEl.value = defaultStartStr < minDate ? minDate : defaultStartStr;
  endEl.value   = maxDate;

  applyPeriod();
}

function setPreset(days) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const records = HISTORY_DATA && HISTORY_DATA.records ? HISTORY_DATA.records : [];
  const dates = records.map(r => r.date).filter(Boolean).sort();
  if (!dates.length) return;

  const endDate = dates[dates.length - 1];
  let startDate;
  if (days === 0) {
    startDate = dates[0];
  } else {
    const end = new Date(endDate);
    const start = new Date(end);
    start.setDate(end.getDate() - days + 1);
    startDate = start.toISOString().slice(0, 10);
    if (startDate < dates[0]) startDate = dates[0];
  }

  document.getElementById('date-start').value = startDate;
  document.getElementById('date-end').value   = endDate;
  applyPeriod();
}

function applyPeriod() {
  if (!HISTORY_DATA || !HISTORY_DATA.records) return;

  const start = document.getElementById('date-start').value;
  const end   = document.getElementById('date-end').value;
  if (!start || !end) return;

  // Filtra registros pelo período
  const filtered = HISTORY_DATA.records.filter(r => r.date >= start && r.date <= end);

  // Agrega por ad_name
  const agg = {};
  for (const r of filtered) {
    const key = r.name;
    if (!agg[key]) {
      agg[key] = { ...r, _ctr_sum: r.ctr || 0, _ctr_n: r.ctr ? 1 : 0 };
    } else {
      const d = agg[key];
      d.spend          += r.spend;
      d.conversations  += r.conversations;
      d.clicks         += r.clicks;
      d.reach          += r.reach;
      d.impressions    += r.impressions;
      d.profile_visits += r.profile_visits;
      d._ctr_sum       += r.ctr || 0;
      d._ctr_n         += r.ctr ? 1 : 0;
      if (r.status === 'ATIVO') d.status = 'ATIVO';
    }
  }

  currentAds = Object.values(agg).map(d => ({
    ...d,
    ctr: d._ctr_n ? +(d._ctr_sum / d._ctr_n).toFixed(4) : 0,
    cpa: d.conversations ? +(d.spend / d.conversations).toFixed(2) : 0,
  }));

  // Atualiza período exibido
  document.getElementById('period-label').textContent = formatDateBR(start) + ' \u2014 ' + formatDateBR(end);

  // Re-renderiza tudo
  renderKPIsFromAds(currentAds);
  renderCitySelectorFromAds(currentAds);
}

function formatDateBR(dateStr) {
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const d = new Date(dateStr + 'T12:00:00');
  return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function groupByCity(ads) {
  const CITY_ORDER = ['BELÉM','ANANINDEUA','CASTANHAL','CAPANEMA','MARITUBA'];
  const cityMap = {};
  for (const ad of ads) {
    const city = ad.city;
    if (!cityMap[city]) {
      cityMap[city] = { city, spend: 0, conversations: 0, clicks: 0,
                        reach: 0, impressions: 0, profile_visits: 0,
                        ads: [], offers: {} };
    }
    const d = cityMap[city];
    d.spend += ad.spend; d.conversations += ad.conversations;
    d.clicks += ad.clicks; d.reach += ad.reach;
    d.impressions += ad.impressions; d.profile_visits += ad.profile_visits;
    d.ads.push(ad);

    const offer = ad.offer;
    if (!d.offers[offer]) d.offers[offer] = { offer, spend: 0, conversations: 0, clicks: 0,
                                               colors: DASHBOARD_DATA.offer_colors[offer] || DASHBOARD_DATA.offer_colors['OUTRO'] };
    d.offers[offer].spend += ad.spend;
    d.offers[offer].conversations += ad.conversations;
    d.offers[offer].clicks += ad.clicks;
  }

  for (const d of Object.values(cityMap)) {
    d.cpa = d.conversations ? +(d.spend / d.conversations).toFixed(2) : 0;
    d.active_ads = d.ads.filter(a => a.spend > 0).length;
    d.top_ads = [...d.ads].sort((a,b) => b.conversations - a.conversations).slice(0, 5);
    const ol = Object.values(d.offers).map(o => ({
      ...o, cpa: o.conversations ? +(o.spend / o.conversations).toFixed(2) : 0
    }));
    d.offers_list = ol.sort((a,b) => b.conversations - a.conversations);
  }

  const ordered = [];
  for (const city of CITY_ORDER) if (cityMap[city]) ordered.push(cityMap[city]);
  for (const [city, data] of Object.entries(cityMap)) if (!CITY_ORDER.includes(city)) ordered.push(data);
  return ordered;
}

function renderKPIsFromAds(ads) {
  const sp = ads.reduce((s,a) => s + a.spend, 0);
  const cv = ads.reduce((s,a) => s + a.conversations, 0);
  const t = {
    spend: sp, conversations: cv,
    cpa: cv ? +(sp/cv).toFixed(2) : 0,
    reach: ads.reduce((s,a) => s + a.reach, 0),
    profile_visits: ads.reduce((s,a) => s + a.profile_visits, 0),
    ads_count: ads.length,
    active_ads: ads.filter(a => a.spend > 0).length,
  };
  renderKPIsFromTotals(t);
}

function renderCitySelectorFromAds(ads) {
  const cities = groupByCity(ads);
  renderCitySelectorFromList(cities);
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────

function init() {
  initHeaderFooter();
  initPeriodBar();
  renderKPIs();
  renderCitySelector();
}

init();
</script>
